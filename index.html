<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        #window {
            width: 100vw;
            height: 100vh;
            position: relative;
            background-color: #f0f0f0;
        }

        img {
            position: absolute;
            width: 100px;
            height: 100px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="window">
        <p>Wait a second...</p>
        <img src="img.jpg" alt="">
    </div>
    
    <script>
        const img = document.querySelector('img');
        const window = document.getElementById('window');

        window.addEventListener('mousemove', (e) => {
            const x = e.clientX - img.width / 2;
            const y = e.clientY - img.height / 2;
            
            img.style.left = x + 'px';
            img.style.top = y + 'px';
        });
    </script>
</body>
</html>
